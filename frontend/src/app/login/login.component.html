<div class="login-bg">
  <div class="login-card">
    <div class="icon">🔍</div>
    <h1 class="title">Employee Search</h1>
    <p class="subtitle">Sign in to your account</p>

    <form (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="field">
        <mat-label>Username</mat-label>
        <input matInput name="username" [(ngModel)]="username" autocomplete="username" cdkFocusInitial />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" [(ngModel)]="password"
               autocomplete="current-password" />
      </mat-form-field>

      @if (error()) {
        <p class="error" role="alert">{{ error() }}</p>
      }

      <button mat-flat-button color="primary" type="submit" class="signin" [disabled]="submitting()">
        @if (submitting()) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>
</div>
